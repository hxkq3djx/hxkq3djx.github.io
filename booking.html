<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>设备预约 - 临床前口腔技能实训新体系</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-booking">
<nav class="navbar">
    <div class="logo">
        <img src="川大校徽.png" alt="四川大学">
    </div>
    <div class="nav-links">
        <a href="index.html">课程简介</a>
        <a href="syllabus.html">教学内容</a>
        <a href="assessment.html">自评中心</a>
        <a href="forum.html">学生论坛</a>
        <a href="booking.html" class="active">设备预约</a>
        <a href="shapr3d.html">Shapr3D</a>
        <div id="auth-section"
             style="margin-left: 1.5rem; padding-left: 1.5rem; border-left: 1px solid #e2e8f0; display: flex; align-items: center;">
            <a href="login.html" class="btn btn-primary" style="padding: 0.3rem 1.2rem; font-size: 0.9rem;">登录</a>
        </div>
</nav>

<div class="container">
    <h1 class="page-title">3D打印机预约</h1>
    <p class="page-desc">预约线下增材制造设备，请按需选择可用时间段。</p>

    <div class="content-box">
        <h2 style="color: var(--medical-blue); margin-bottom: 1rem;">🖥️ 线下设备预约表</h2>
        <p style="color: var(--text-gray); margin-bottom: 1.5rem;">当前空闲设备：2台 | 运行中：3台</p>
        <form onsubmit="alert('预约成功！请准时前往临床前实训中心。'); return false;">
            <div class="form-group">
                <label>选择预约日期</label>
                <input type="date" class="form-control" required>
            </div>
            <div class="form-group">
                <label>选择时间段</label>
                <select class="form-control">
                    <option>上午 08:30 - 12:00</option>
                    <option>下午 14:00 - 18:00</option>
                    <option>晚上 19:00 - 21:30</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">确认预约设备</button>
        </form>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const currentUser = localStorage.getItem('currentUser');
        const userRole = localStorage.getItem('userRole');
        const authSection = document.getElementById('auth-section');

        // 如果存在登录信息，则替换 UI
        if (currentUser) {
            if (userRole === 'admin') {
                authSection.innerHTML = `
                    <span style="color: var(--scu-red); font-weight: bold; margin-right: 1rem;">⚙️ 管理员</span>
                    <a href="admin.html" style="color: var(--medical-blue); font-size: 0.9rem; margin-right: 1rem; font-weight: bold;">进入后台</a>
                    <a href="#" onclick="handleLogout()" style="color: var(--text-gray); font-size: 0.9rem;">退出</a>
                `;
            } else {
                authSection.innerHTML = `
                    <span style="color: var(--medical-blue); font-weight: bold; margin-right: 1rem;">🎓 同学: ${currentUser}</span>
                    <a href="#" onclick="handleLogout()" style="color: var(--text-gray); font-size: 0.9rem;">退出</a>
                `;
            }
        }
    });

    // 退出登录，清空缓存并刷新
    function handleLogout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('userRole');
        window.location.reload();
    }
</script>
</body>
</html>
