<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - 临床前口腔技能实训系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-index">
    <nav class="navbar">
        <div class="logo">
            <img src="川大校徽.png" alt="四川大学">
        </div>
        <div class="nav-links">
            <a href="index.html">返回首页</a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center;">
        <div class="content-box" style="width: 100%; max-width: 400px; text-align: center; padding: 3rem 2rem; margin-top: 5rem;">
            <h2 style="color: var(--medical-blue); margin-bottom: 2rem;">系统登录</h2>

            <div id="error-msg" style="display: none; background-color: #fee2e2; color: #991b1b; padding: 0.8rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; text-align: left; border-left: 4px solid #ef4444;">
                ⚠️ 账号或密码错误，请检查后重试。
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入账号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">登 录</button>
            </form>
        </div>
    </div>

    <script>
        // 【核心验证逻辑】在这里配置允许登录的账号和密码字典
        const validAccounts = {
            // 管理员账号
            'admin': { password: '123456', role: 'admin' },

            // 学生账号白名单 (可无限添加)
            '2022151640132': { password: '123456', role: 'student' },
            '2022151640071': { password: '123456', role: 'student' },
            'aaa': { password: 'aaa', role: 'student' }
        };

        function handleLogin(event) {
            event.preventDefault(); // 阻止页面默认刷新

            // 获取用户输入的账号和密码
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            // 验证逻辑：判断账号是否存在于字典中，且密码是否匹配
            if (validAccounts[usernameInput] && validAccounts[usernameInput].password === passwordInput) {

                // 验证通过，隐藏错误提示
                errorMsg.style.display = 'none';

                // 获取该账号的角色配置
                const userConfig = validAccounts[usernameInput];

                // 写入本地存储 (记录登录状态)
                localStorage.setItem('currentUser', usernameInput);
                localStorage.setItem('userRole', userConfig.role);

                // 根据角色跳转到不同页面
                if (userConfig.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                // 验证失败：账号不存在或密码错误，显示红色提示框
                errorMsg.style.display = 'block';

                // 可选体验优化：清空密码框让用户重新输入
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
