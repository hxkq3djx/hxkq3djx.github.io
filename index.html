<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页 - 临床前口腔技能实训新体系</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-index">
<nav class="navbar">
    <div class="logo">
        <img src="川大校徽.png" alt="四川大学">
    </div>
    <div class="nav-links">
        <a href="index.html" class="active">课程简介</a>
        <a href="syllabus.html">教学内容</a>
        <a href="assessment.html">自评中心</a>
        <a href="forum.html">学生论坛</a>
        <a href="booking.html">设备预约</a>
        <a href="shapr3d.html">Shapr3D</a>
        <div id="auth-section"
             style="margin-left: 1.5rem; padding-left: 1.5rem; border-left: 1px solid #e2e8f0; display: flex; align-items: center;">
            <a href="login.html" class="btn btn-primary" style="padding: 0.3rem 1.2rem; font-size: 0.9rem;">登录</a>
        </div>
</nav>

<div class="container" style="display: flex; flex-direction: column; justify-content: center; text-align: center;">
    <h1 style="font-size: 3rem; color: var(--scu-red); margin-bottom: 1.5rem;">仿生牙智造引导的<br>人机交互式临床前口腔技能实训操教学系统
    </h1>
    <p style="font-size: 1.1rem; color: var(--text-gray); max-width: 800px; margin: 0 auto 3rem;">
        本课程旨在帮助同学自查操作过程中的不足，提供一个3D建模自主学习平台。通过引入前沿的数字医学技术与增材制造理念，全方位提升学生的空间感知与临床实践操作水平，搭建从理论到临床的数字化桥梁。
    </p>
    <div>
        <a href="syllabus.html" class="btn btn-primary" style="margin-right: 1rem;">探索课程大纲</a>
        <a href="shapr3d.html" class="btn btn-red">进入 Shapr3D 平台</a>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const currentUser = localStorage.getItem('currentUser');
        const userRole = localStorage.getItem('userRole');
        const authSection = document.getElementById('auth-section');

        // 如果存在登录信息，则替换 UI
        if (currentUser) {
            if (userRole === 'admin') {
                authSection.innerHTML = `
                    <span style="color: var(--scu-red); font-weight: bold; margin-right: 1rem;">⚙️ 管理员</span>
                    <a href="admin.html" style="color: var(--medical-blue); font-size: 0.9rem; margin-right: 1rem; font-weight: bold;">进入后台</a>
                    <a href="#" onclick="handleLogout()" style="color: var(--text-gray); font-size: 0.9rem;">退出</a>
                `;
            } else {
                authSection.innerHTML = `
                    <span style="color: var(--medical-blue); font-weight: bold; margin-right: 1rem;">🎓 同学: ${currentUser}</span>
                    <a href="#" onclick="handleLogout()" style="color: var(--text-gray); font-size: 0.9rem;">退出</a>
                `;
            }
        }
    });

    // 退出登录，清空缓存并刷新
    function handleLogout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('userRole');
        window.location.reload();
    }
</script>
</body>
</html>
