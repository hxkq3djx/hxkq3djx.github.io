<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Shapr3D 平台 - 临床前口腔技能实训新体系</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-shapr3d">
<nav class="navbar">
    <div class="logo">
        <img src="川大校徽.png" alt="四川大学">
    </div>
    <div class="nav-links">
        <a href="index.html">课程简介</a>
        <a href="syllabus.html">教学内容</a>
        <a href="assessment.html">自评中心</a>
        <a href="forum.html">学生论坛</a>
        <a href="booking.html">设备预约</a>
        <a href="shapr3d.html" class="active">Shapr3D</a>
        <div id="auth-section"
             style="margin-left: 1.5rem; padding-left: 1.5rem; border-left: 1px solid #e2e8f0; display: flex; align-items: center;">
            <a href="login.html" class="btn btn-primary" style="padding: 0.3rem 1.2rem; font-size: 0.9rem;">登录</a>
        </div>
</nav>

<div class="container" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="content-box"
         style="background: linear-gradient(135deg, #1e293b, #334155); color: white; text-align: center; width: 100%; max-width: 800px; padding: 4rem 2rem; border-radius: 16px;">
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Shapr3D</h2>
        <h3 style="margin-bottom: 1.5rem; font-weight: normal; color: #cbd5e1;">建模自主学习平台</h3>
        <p style="margin-bottom: 3rem; opacity: 0.9; line-height: 1.8; font-size: 1.1rem;">
            利用业界领先的直观3D设计软件<br>随时随地推演备牙形态与空间关系，提升临床空间感知。
        </p>
        <a href="#" class="btn" style="background: white; color: #1e293b; font-size: 1.1rem; padding: 1rem 3rem;"
           onclick="alert('即将唤起 Shapr3D App 或跳转至官方网页...');">
            🚀 进入Shapr3D建模
        </a>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const currentUser = localStorage.getItem('currentUser');
        const userRole = localStorage.getItem('userRole');
        const authSection = document.getElementById('auth-section');

        // 如果存在登录信息，则替换 UI
        if (currentUser) {
            if (userRole === 'admin') {
                authSection.innerHTML = `
                    <span style="color: var(--scu-red); font-weight: bold; margin-right: 1rem;">⚙️ 管理员</span>
                    <a href="admin.html" style="color: var(--medical-blue); font-size: 0.9rem; margin-right: 1rem; font-weight: bold;">进入后台</a>
                    <a href="#" onclick="handleLogout()" style="color: var(--text-gray); font-size: 0.9rem;">退出</a>
                `;
            } else {
                authSection.innerHTML = `
                    <span style="color: var(--medical-blue); font-weight: bold; margin-right: 1rem;">🎓 同学: ${currentUser}</span>
                    <a href="#" onclick="handleLogout()" style="color: var(--text-gray); font-size: 0.9rem;">退出</a>
                `;
            }
        }
    });

    // 退出登录，清空缓存并刷新
    function handleLogout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('userRole');
        window.location.reload();
    }
</script>
</body>
</html>
